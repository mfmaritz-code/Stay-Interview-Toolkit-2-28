<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Interview Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfcfd; }
        #root { min-height: 100vh; }
        /* Simple Loading State */
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">Preparing your toolkit...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Icon component that works without complex imports
        const LucideIcon = ({ name, size = 20 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [step, setStep] = useState(1);
            const [config, setConfig] = useState({ trigger: '', persona: '', sentiment: '' });
            const [loading, setLoading] = useState(false);
            const [guide, setGuide] = useState(null);

            const handleGenerate = () => {
                setLoading(true);
                // Simulate AI Generation
                setTimeout(() => {
                    setGuide({
                        opening: "I'm so glad we're sitting down. You're a vital part of this team.",
                        questions: ["What do you look forward to most each day?", "What keeps you here?"]
                    });
                    setLoading(false);
                }, 1000);
            };

            if (guide) {
                return (
                    <div className="max-w-2xl mx-auto p-8 mt-10 bg-white shadow-2xl rounded-3xl border border-gray-100">
                        <h2 className="text-2xl font-black text-blue-600 mb-6">YOUR GUIDE</h2>
                        <div className="p-6 bg-blue-50 rounded-xl mb-6 italic text-lg border-l-4 border-blue-500">
                            "{guide.opening}"
                        </div>
                        <ul className="space-y-4">
                            {guide.questions.map((q, i) => (
                                <li key={i} className="p-4 bg-gray-50 rounded-lg font-bold text-gray-800 flex gap-3">
                                    <span className="text-blue-500">{i+1}.</span> {q}
                                </li>
                            ))}
                        </ul>
                        <button onClick={() => setGuide(null)} className="mt-8 w-full py-4 bg-gray-100 text-gray-500 font-bold rounded-xl">Start Over</button>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto p-6 pt-16">
                    <div className="text-center mb-10">
                        <h1 className="text-4xl font-black text-gray-900">STAY INTERVIEW</h1>
                        <p className="text-blue-600 font-bold tracking-widest text-sm">MANAGER TOOLKIT</p>
                    </div>

                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                        {step === 1 && (
                            <div className="space-y-4">
                                <h3 className="font-black text-gray-400 uppercase text-xs tracking-widest">Select Trigger</h3>
                                {["90-Day Milestone", "Annual Check-In", "At-Risk Signal"].map(t => (
                                    <button key={t} onClick={() => { setConfig({...config, trigger: t}); setStep(2); }}
                                        className="w-full p-5 text-left rounded-2xl border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-bold text-gray-700">
                                        {t}
                                    </button>
                                ))}
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-4">
                                <h3 className="font-black text-gray-400 uppercase text-xs tracking-widest">Select Persona</h3>
                                {["High Performer", "New Hire", "Steady Performer"].map(p => (
                                    <button key={p} onClick={() => { setConfig({...config, persona: p}); setStep(3); }}
                                        className="w-full p-5 text-left rounded-2xl border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50 transition-all font-bold text-gray-700">
                                        {p}
                                    </button>
                                ))}
                                <button onClick={() => setStep(1)} className="w-full py-2 text-gray-400 text-sm font-bold mt-4">Back</button>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="space-y-4">
                                <h3 className="font-black text-gray-400 uppercase text-xs tracking-widest">Confirm & Generate</h3>
                                <div className="p-4 bg-gray-50 rounded-xl text-sm font-bold text-gray-500 mb-4">
                                    Trigger: {config.trigger} <br/>
                                    Persona: {config.persona}
                                </div>
                                <button onClick={handleGenerate} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all">
                                    {loading ? "Generating..." : "BUILD TOOLKIT"}
                                </button>
                                <button onClick={() => setStep(2)} className="w-full py-2 text-gray-400 text-sm font-bold mt-2">Back</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
